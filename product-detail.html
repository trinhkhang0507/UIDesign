<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/product-detail.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    <title>Document</title>
</head>
<body>
    <div id="header"></div>
    <div class="container product-detail">

    <!-- LEFT: IMAGE -->
        <div class="product-images">
            <img class="div1" src="images/slide_index_1.webp">
            <!-- <div class="thumbs"> -->
            <img class="div2" src="images/slide_index_1.webp">
            <img class="div3" src="images/slide_index_2.webp">
            <img class="div4" src="images/slide_index_3.webp">
            <!-- </div> -->
        </div>

        <!-- RIGHT: INFO -->
        <div class="product-info">
            <h2>Adidas Yeezy Slide Slate</h2>
            <p><strong>Mã sản phẩm</strong></p>
            <p class="price">2.800.000đ</p>

            <!-- SIZE -->
            <div class="sizes">
                <p>Kích thước:</p>
                <div class="size-box">
                    <button>38</button>
                    <button>39</button>
                    <button>40</button>
                    <button>41</button>
                </div>
            </div>

            <!-- QUANTITY -->
            <div class="quantity">
                <p>Số lượng:</p>
                <div class="qty-box">
                    <button class="minus">-</button>
                    <input type="text" value="1" class="qty-input">
                    <button class="plus">+</button>
                </div>
            </div>

            <!-- BUTTON -->
            <div class="actions">
                <button class="btn"><i class="fa-solid fa-cart-shopping"></i>Thêm vào giỏ</button>
                <button class="btn-outline"><i class="fa-solid fa-check"></i>Mua ngay</button>
            </div>
            <div class="actions">
                <strong class="desc">Mô tả sản phẩm:</strong>
            </div>
        </div>

    </div>
    <div id="footer"></div>
    <script src="index.js"></script>
</body>
</html>
