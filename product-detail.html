<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/product-detail.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    <title>Document</title>
</head>
<body>
    <div id="header"></div>
    <div class="container product-detail">

    <!-- LEFT: IMAGE -->
        <div class="product-images">
            <img class="div1" src="images/slide_index_1.webp" alt="">
            <img class="div2" src="images/slide_index_1.webp" alt="">
            <img class="div3" src="images/slide_index_2.webp" alt="">
            <img class="div4" src="images/slide_index_3.webp" alt="">
        </div>

        <!-- RIGHT: INFO -->
        <div class="product-info">
            <h2 class="product-detail-title">Đang tải…</h2>
            <p class="product-detail-sku-line"><strong>Mã sản phẩm:</strong> <span class="product-detail-sku">—</span></p>
            <p class="price product-detail-price"></p>

            <div class="product-detail-colors" hidden>
                <div class="detail-colors-row">
                    <p>Màu sắc:</p>
                    <div class="product-detail-color-box" role="group" aria-label="Chọn màu"></div>
                </div>
            </div>

            <!-- SIZE -->
            <div class="sizes">
                <p>Kích thước:</p>
                <div class="size-box"></div>
            </div>

            <!-- QUANTITY -->
            <div class="quantity">
                <p>Số lượng:</p>
                <div class="qty-box">
                    <button class="minus">-</button>
                    <input type="text" value="1" class="qty-input">
                    <button class="plus">+</button>
                </div>
            </div>

            <!-- BUTTON -->
            <div class="actions">
                <button type="button" class="btn product-detail-add-cart"><i class="fa-solid fa-cart-shopping"></i>Thêm vào giỏ</button>
                <button type="button" class="btn-outline product-detail-buy"><i class="fa-solid fa-check"></i>Mua ngay</button>
            </div>
            <div class="actions product-detail-desc-wrap">
                <strong class="desc">Mô tả sản phẩm</strong>
                <p class="product-detail-desc"></p>
            </div>
        </div>

    </div>
    <div id="footer"></div>
    <script src="index.js"></script>
</body>
</html>
