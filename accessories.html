<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/product.css">
    <link rel="stylesheet" href="css/footer.css">
    <title>Phụ kiện</title>
</head>
<body>

<div id="header"></div>

<main class="container product-page" data-listing-type="accessories">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="filter">
            <h3 class="filter-title">Danh mục sản phẩm</h3>
            <div class="filter-content">
                <label><input type="radio" name="product" value="all" checked> Tất cả</label>
                <label><input type="radio" name="product" value="shoes"> Sản phẩm nam</label>
                <label><input type="radio" name="product" value="slippers"> Sản phẩm nữ</label>
            </div>  
        </div>
        <div class="filter">
            <h3 class="filter-title">Thương hiệu</h3>
            <div class="filter-content">
                <label>
                    <input type="radio" name="brand" value="all" checked> Tất cả
                </label>
                <label>
                    <input type="radio" name="brand" value="1"> Nike
                </label>
                <label>
                    <input type="radio" name="brand" value="2"> Adidas
                </label>
                <label>
                    <input type="radio" name="brand" value="3"> S&B
                </label>
                <label>
                    <input type="radio" name="brand" value="4"> Crep Protect
                </label>
                <label>
                    <input type="radio" name="brand" value="5"> Jason Markk
                </label>
                <label>
                    <input type="radio" name="brand" value="6"> SUPER PILLS
                </label>
                <label>
                    <input type="radio" name="brand" value="7"> Sneaker Zone
                </label>
                <label>
                    <input type="radio" name="brand" value="8"> Sneaker Myth
                </label>
                <label>
                    <input type="radio" name="brand" value="9"> SHOETREE
                </label>
            </div>
        </div>
        <div class="filter">
            <h3 class="filter-title">Giá</h3>
            <div class="filter-content">
                <label>
                    <input type="radio" name="price" value="all" checked> Tất cả
                </label>
                <label>
                    <input type="radio" name="price" value="1"> Nhỏ hơn 500.000đ
                </label>
                <label>
                    <input type="radio" name="price" value="2"> Từ 500.000đ - 2.000.000đ
                </label>
                <label>
                    <input type="radio" name="price" value="3"> Từ 2.000.000đ - 3.000.000đ
                </label>
                <label>
                    <input type="radio" name="price" value="4"> Từ 3.000.000đ - 4.000.000đ
                </label>
                <label>
                    <input type="radio" name="price" value="5"> Lớn hơn 4.000.000đ
                </label>
            </div>
        </div>

        <div class="filter-color">
            <div>
                <h3 class="filter-title">Màu sắc</h3>
            </div>
            <div class="filter-content">
                <label class="color-filter-all"><input type="radio" name="color" value="all" checked> Tất cả</label>
                <label class="color-option">
                    <input type="radio" name="color" value="white">
                    <span class="color-circle white"></span>
                </label>
                <label class="color-option">
                    <input type="radio" name="color" value="black">
                    <span class="color-circle black"></span>
                </label>
                <label class="color-option">
                    <input type="radio" name="color" value="red">
                    <span class="color-circle red"></span>
                </label>
                <label class="color-option">
                    <input type="radio" name="color" value="pink">
                    <span class="color-circle pink"></span>
                </label>
                <label class="color-option">
                    <input type="radio" name="color" value="purple">
                    <span class="color-circle purple"></span>
                </label>
                <label class="color-option">
                    <input type="radio" name="color" value="light-blue">
                    <span class="color-circle light-blue"></span>
                </label>
                <label class="color-option">
                    <input type="radio" name="color" value="blue">
                    <span class="color-circle blue"></span>
                </label>
                <label class="color-option">
                    <input type="radio" name="color" value="green">
                    <span class="color-circle green"></span>
                </label>
                <label class="color-option">
                    <input type="radio" name="color" value="orange">
                    <span class="color-circle orange"></span>
                </label>
                <label class="color-option">
                    <input type="radio" name="color" value="grey">
                    <span class="color-circle grey"></span>
                </label>
                <label class="color-option">
                    <input type="radio" name="color" value="brown">
                    <span class="color-circle brown"></span>
                </label>
                <label class="color-option">
                    <input type="radio" name="color" value="yellow">
                    <span class="color-circle yellow"></span>
                </label>
            </div>  
        </div>
        <div class="filter-size">
            <div>
                <h3 class="filter-title">Kích thước</h3>
            </div>
            <div class="filter-content size-options">
                <label class="size-option-all"><input type="radio" name="size" value="all" checked> Tất cả</label>
                <label><input type="radio" name="size" value="s"> S</label>
                <label><input type="radio" name="size" value="m"> M</label>
                <label><input type="radio" name="size" value="l"> L</label>
                <label><input type="radio" name="size" value="xl"> XL</label>
                <label><input type="radio" name="size" value="xxl"> XXL</label>
            </div>
        </div>
    </aside>

    <!-- PRODUCT -->
    <div class="product-content">
        <div class="product-header">
            <div class="product-header-titles">
                <h3>Tất cả sản phẩm</h3>
                <p class="product-list-count" aria-live="polite"></p>
            </div>
            <label class="product-search-wrap">
                <span class="visually-hidden">Tìm theo tên sản phẩm</span>
                <input type="search" class="product-search" placeholder="Tìm theo tên sản phẩm..." autocomplete="off">
            </label>
        </div>

        <div class="products">
            <div class="product" data-category="shoes" data-brand="1" data-price="350000" data-color="white" data-size="m">
                <a href="product-detail.html?id=acc-1">
                    <img src="images/10.jpg" alt="">
                    <p>Nike Shoe Freshener</p>
                    <span>350.000đ</span>
                </a>
                <div class="product-actions">
                    <button type="button" class="btn cart">Thêm vào giỏ</button>
                    <button type="button" class="btn buy">Mua ngay</button>
                </div>
            </div>
            <div class="product" data-category="slippers" data-brand="2" data-price="890000" data-color="black" data-size="s">
                <a href="product-detail.html?id=acc-2">
                    <img src="images/11.jpg" alt="">
                    <p>Adidas Shoe Tree gỗ</p>
                    <span>890.000đ</span>
                </a>
                <div class="product-actions">
                    <button type="button" class="btn cart">Thêm vào giỏ</button>
                    <button type="button" class="btn buy">Mua ngay</button>
                </div>
            </div>
            <div class="product" data-category="shoes" data-brand="4" data-price="420000" data-color="red" data-size="l">
                <a href="product-detail.html?id=acc-3">
                    <img src="images/12.jpg" alt="">
                    <p>Crep Protect vệ sinh giày</p>
                    <span>420.000đ</span>
                </a>
                <div class="product-actions">
                    <button type="button" class="btn cart">Thêm vào giỏ</button>
                    <button type="button" class="btn buy">Mua ngay</button>
                </div>
            </div>
            <div class="product" data-category="slippers" data-brand="5" data-price="2400000" data-color="blue" data-size="xl">
                <a href="product-detail.html?id=acc-4">
                    <img src="images/13.jpg" alt="">
                    <p>Jason Markk bộ vệ sinh</p>
                    <span>2.400.000đ</span>
                </a>
                <div class="product-actions">
                    <button type="button" class="btn cart">Thêm vào giỏ</button>
                    <button type="button" class="btn buy">Mua ngay</button>
                </div>
            </div>
            <div class="product" data-category="shoes" data-brand="7" data-price="3300000" data-color="grey" data-size="xxl">
                <a href="product-detail.html?id=acc-5">
                    <img src="images/14.jpg" alt="">
                    <p>Sneaker Zone dây giày</p>
                    <span>3.300.000đ</span>
                </a>
                <div class="product-actions">
                    <button type="button" class="btn cart">Thêm vào giỏ</button>
                    <button type="button" class="btn buy">Mua ngay</button>
                </div>
            </div>
            <div class="product" data-category="slippers" data-brand="9" data-price="4500000" data-color="green" data-size="m">
                <a href="product-detail.html?id=acc-6">
                    <img src="images/15.jpg" alt="">
                    <p>SHOETREE form giữ dáng</p>
                    <span>4.500.000đ</span>
                </a>
                <div class="product-actions">
                    <button type="button" class="btn cart">Thêm vào giỏ</button>
                    <button type="button" class="btn buy">Mua ngay</button>
                </div>
            </div>
        </div>
    </div>

</main>

<div id="footer"></div>

<script src="index.js"></script>

</body>
</html>
