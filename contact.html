<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/contact.css">

    <!-- ICON -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <title>Liên hệ</title>
</head>
<body>

<div id="header"></div>

<main class="container contact-page">

    <!-- LEFT -->
    <div class="contact-info">
        <h2>LIÊN HỆ</h2>

        <p><strong>Cửa hàng giày chính hãng Vlusneaker.vn</strong></p>

        <p><i class="fa-solid fa-store"></i> HỘ KINH DOANH CỬA HÀNG THỜI TRANG VLUSNEAKER</p>

        <p><i class="fa-solid fa-phone"></i> 0901430191</p>

        <p><i class="fa-solid fa-location-dot"></i> Địa chỉ: 69/68 Đặng Thùy Trâm, Bình Lợi Trung, TP HCM</p>

        <p><i class="fa-solid fa-envelope"></i> vlusneaker@gmail.com</p>
    </div>

    <!-- RIGHT -->
    <div class="contact-form">
        <h3>Để lại lời nhắn cho chúng tôi</h3>

        <form>
            <div class="input-box">
                <i class="fa-solid fa-user"></i>
                <input type="text" placeholder="Họ và tên">
            </div>

            <div class="input-box">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" placeholder="Email">
            </div>

            <div class="input-box">
                <i class="fa-solid fa-phone"></i>
                <input type="text" placeholder="Số điện thoại">
            </div>

            <textarea placeholder="Viết lời nhắn"></textarea>

            <button type="submit" class="btn-submit">GỬI LỜI NHẮN</button>
        </form>
    </div>

</main>

<div id="footer"></div>

<script src="index.js"></script>
</body>
</html>
